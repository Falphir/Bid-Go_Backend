# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - BidGoWebAPI

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read
    
env:
  PROJECT_PATH: Bid-Go_Backend/Bid-Go_Backend/Bid-Go.csproj
  PUBLISH_DIR: ${{ github.workspace }}/publish

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o ./publish

      - uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/download-artifact@v4
          with:
            name: api-build
            path: ./publish
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.__clientidsecretname__ }}
          tenant-id: ${{ secrets.__tenantidsecretname__ }}
          subscription-id: ${{ secrets.__subscriptionidsecretname__ }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: 'BidGoWebAPI'
          package: ./publish
          