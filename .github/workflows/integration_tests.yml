name: Integration Tests

on:
  pull_request:
    branches: [ master, develop, 'feature/**', 'changerequest/**', 'hotfix/**' ]

jobs:
  integration-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Run integration tests (namespace filter) + coverage + TRX
        run: |
          dotnet test ./Bid-Go.Tests/Bid-Go.Tests.csproj \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory "./TestResultsIntegration" \
            --logger:"trx;LogFileName=test-results-integration.trx" \
            --filter "FullyQualifiedName~Bid_Go.Tests.Integration"

      - name: Generate coverage report (HTML + MD)
        if: success()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"**/TestResultsIntegration/**/coverage.cobertura.xml" \
            -targetdir:"TestResultsIntegration/CoverageReport" \
            -reporttypes:"Html;MarkdownSummaryGithub"

      - name: Upload artifacts (TRX + Coverage)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-tests-${{ github.run_id }}
          path: |
            TestResultsIntegration/test-results-integration.trx
            TestResultsIntegration/CoverageReport

      - name: Publish test summary (GitHub Job Summary)
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: "Tests ${{ matrix.os }}"
          path: "TestResults/test-results.trx"
          reporter: dotnet-trx
          use-actions-summary: true
          fail-on-error: false
