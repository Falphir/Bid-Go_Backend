name: .NET

on:
  push:
    branches: [ "master", "develop", "feature/*", "changerequest/*", "hotfix/*" ]
  pull_request:
    branches: [ "master", "develop", "feature/*", "changerequest/*", "hotfix/*" ]

jobs:
  build-and-unit:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Test (all) with coverage + TRX
        run: dotnet test --configuration Release --collect:"XPlat Code Coverage" --results-directory "./TestResults" --logger:"trx;LogFileName=test-results.trx" --verbosity normal

      - name: Generate coverage report (HTML + Markdown)
        if: success()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:"**/coverage.cobertura.xml" -targetdir:"TestResults/CoverageReport" -reporttypes:"Html;MarkdownSummaryGithub"

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report-${{ matrix.os }}
          path: TestResults/CoverageReport

      - name: Publish test summary (GitHub Job Summary)
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: "Tests ${{ matrix.os }}"
          path: "TestResults/test-results.trx"
          reporter: dotnet-trx
          use-actions-summary: true
          fail-on-error: false
